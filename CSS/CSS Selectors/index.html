<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* CSS Selector 
        div
        {
            background-color: red;
        } */

        /* Class Selector */
        .red {
            background-color: red;
        }

        /* Id Selector */
        #green {
            background-color: green;
        }

        /* Child Selector */
        div>p {
            color: blue;
            background-color: brown;
        }

        /* Descendant Selector */
        div p {
            color: blue;
            background-color: brown;
        }

        /* Universal Selector */
        * {
            margin: 0;
            padding: 0;
        }

        /* Pseudo Selectors */
        a:visited {
            color: yellow;
        }

        a:link {
            color: green;
        }

        a:active {
            background-color: red;
        }

        a:hover {
            background-color: aqua;
        }
    </style>
</head>

<body>
    <div class="red">
        I am red
        <p>
            I am a para inside div
        </p>
    </div>
    <div id="green">
        I am another div
    </div>

    <a href="https://google.com">Go to Google</a>
    <a href="https://facebook.com">Go to Facebook</a>

</body>

</html>
